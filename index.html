<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Editions Celebration</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* animated gradient background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(239,68,68,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%);
  animation:bgMove 20s linear infinite;
}

@keyframes bgMove{
  0%{transform:translate(0,0)}
  50%{transform:translate(-5%,5%)}
  100%{transform:translate(0,0)}
}

main{position:relative;z-index:2}

/* logo */
.logo{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  font-weight:600;
  z-index:5;
}

/* audio toggle */
.audio-toggle{
  position:fixed;
  top:20px;
  right:20px;
  z-index:6;
  background:rgba(255,255,255,0.1);
  border:none;
  padding:10px 14px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* scene */
.scene{height:7200vh;position:relative}
.stage{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px}

.card3d{
  width:clamp(252px,60vw,370px);
  aspect-ratio:4/6;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.25s ease-out;
}

/* glow always on */
.card3d::before{
  content:"";
  position:absolute;
  inset:-12px;
  border-radius:20px;
  background:radial-gradient(circle, rgba(239,68,68,0.25), transparent 70%);
  filter:blur(20px);
  z-index:-1;
  opacity:0.7;
}

.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:16px;
  overflow:hidden;
}

.front{background:#1e293b}
.back{background:#ef4444;transform:rotateY(180deg)}

.face img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.label{display:none}

.scrollHint{position:absolute;bottom:40px;opacity:.6}

section{padding:48px 18px;max-width:1100px;margin:auto}

</style>
</head>
<body>

<div class="logo">Pearl Academy</div>
<button class="audio-toggle" onclick="toggleAudio()">🔊</button>

<audio id="bgAudio" src="audio.mp3" autoplay loop></audio>

<main>

<div class="scene" id="scene">
  <div class="stage">

    <div class="card3d" id="card">
      <div class="face front" id="front">
        <img alt="front">
      </div>
      <div class="face back" id="back">
        <img alt="back">
      </div>
    </div>

    <div class="scrollHint">Scroll</div>
  </div>
</div>

</main>

<script>

/* audio control */
const audio=document.getElementById("bgAudio")
function toggleAudio(){
  if(audio.paused){audio.play()}
  else{audio.pause()}
}

/* 3D card logic */
const scene=document.getElementById("scene")
const card=document.getElementById("card")
const front=document.getElementById("front")
const back=document.getElementById("back")

const TOTAL_SLIDES=100
const editions=Array.from({length:TOTAL_SLIDES},(_,i)=>({
  img:`images/slide${i+1}.jpg`
}))

front.querySelector("img").src=editions[0].img
back.querySelector("img").src=editions[1].img

let currentIndex=-1

window.addEventListener("scroll",()=>{
  const rect=scene.getBoundingClientRect()
  const progress=Math.min(Math.max(-rect.top/(rect.height-window.innerHeight),0),1)

  const SPEED=0.6
  const rotation=progress*((editions.length-1)*180)*SPEED
  card.style.transform=`rotateY(${rotation}deg)`

  const index=Math.floor(rotation/180)
  if(index===currentIndex)return
  currentIndex=index

  const face=index%2

  if(face===0){
    if(editions[index]) front.querySelector("img").src=editions[index].img
    if(editions[index+1]) back.querySelector("img").src=editions[index+1].img
  }else{
    if(editions[index]) back.querySelector("img").src=editions[index].img
    if(editions[index+1]) front.querySelector("img").src=editions[index+1].img
  }
})

</script>

</body>
</html>
