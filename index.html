<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Experience</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;overflow:hidden}

@media (prefers-reduced-motion: reduce){
 body::before{animation:none}
}

body::before{content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.18), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.18), transparent 40%);
animation:bgMove 30s linear infinite}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-3%,3%)}100%{transform:translate(0,0)}}

.logoWrap{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:5;text-align:center}
.logo{width:min(49vw,294px)}
.tagline{margin-top:8px;font-size:12px;opacity:.8}

.audioBtn{position:fixed;top:12px;right:16px;z-index:10;cursor:pointer;font-size:18px;opacity:.8}

.stage{height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px;position:relative;z-index:2}

.carousel{position:relative;width:100%;height:min(70vh,420px);overflow:hidden;touch-action:none;cursor:grab}

.card{position:absolute;left:50%;top:50%;width:clamp(180px,70vw,252px);aspect-ratio:252/370;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);background:#000;transform:translate(-50%,-50%)}
.card img,.card video{width:100%;height:100%;object-fit:cover;pointer-events:none}

.hint{position:absolute;bottom:80px;font-size:14px;opacity:.85;display:flex;align-items:center;gap:8px}

.arrow{display:inline-block;opacity:.7}
.arrow.left{animation:arrowLeft 1.2s infinite ease-in-out}
.arrow.right{animation:arrowRight 1.2s infinite ease-in-out}

@keyframes arrowLeft{0%{transform:translateX(0)}50%{transform:translateX(-6px)}100%{transform:translateX(0)}}
@keyframes arrowRight{0%{transform:translateX(0)}50%{transform:translateX(6px)}100%{transform:translateX(0)}}
</style>
</head>
<body>

<div class="logoWrap">
<img src="logo.png" class="logo">
<div class="tagline">Celebrating 100 weeks</div>
</div>

<div class="audioBtn" id="audioBtn">🔊</div>
<audio id="bgAudio" src="audio.mp3" loop></audio>

<div class="stage">
<div class="carousel" id="carousel"></div>
<div class="hint">
 <span class="arrow left">←</span>
 <span>Swipe</span>
 <span class="arrow right">→</span>
</div>
</div>

<script>
const TOTAL=89

const data = Array.from({length:TOTAL},(_,i)=>{
 if(i===20) return {type:'video',src:'slide20.mp4'}
 if(i===35) return {type:'video',src:'cancerday.mp4'}
 if(i===84) return {type:'video',src:'video86.mp4'}
 if(i===88) return {type:'video',src:'FDCI.mp4'}
 if(i<=87) return {type:'image',src:`images/slide${i}.webp`}
 return null
})

const carousel=document.getElementById('carousel')
let index=0, target=0, dragging=false

const videoDurationCache = {}

function createCard(item, isCenter){
 const el=document.createElement('div')
 el.className='card'

 if(item.type==='video'){
  const v=document.createElement('video')
  v.src=item.src
  v.muted=true
  v.loop=true
  v.playsInline=true
  v.preload='metadata'

  if(isCenter){
    v.autoplay=true
    v.onloadeddata=()=>v.play().catch(()=>{})
  }

  el.appendChild(v)
 }else{
  const img=document.createElement('img')
  img.src=item.src
  img.loading='lazy'
  el.appendChild(img)
 }
 return el
}

function render(){
 const current=Math.floor(index)
 carousel.innerHTML=''

 for(let i=current-3;i<=current+3;i++){
  if(!data[i]) continue

  const offset = i - index
  const abs = Math.abs(offset)

  const card=createCard(data[i], abs<0.5)

  const x = offset * 95
  const scale = 1 - Math.min(Math.pow(abs,1.2)*0.12,0.3)
  const rotateY = -offset * 15
  const rotateX = (target-index)*3
  const opacity = abs>3 ? 0 : (abs<0.5 ? 1 : 0.75)

  card.style.transform = `translate(calc(-50% + ${x}px), -50%) scale(${scale}) rotateY(${rotateY}deg) rotateX(${rotateX}deg)`
  card.style.opacity = opacity
  card.style.zIndex = 20 - Math.round(abs*5)

  const shadow = 12 + (1-abs)*28
  card.style.boxShadow = `0 ${shadow}px ${shadow*1.5}px rgba(0,0,0,0.55)`

  carousel.appendChild(card)
 }
}

function animate(){
 const diff = target - index
 index += diff * 0.06
 if(Math.abs(diff) < 0.0005) index = target
 render()
 requestAnimationFrame(animate)
}
animate()

let autoTimer=null
function scheduleNext(){
 clearTimeout(autoTimer)
 const current=Math.round(target)
 const item=data[current]

 if(item?.type==='video'){
   if(videoDurationCache[item.src]){
     autoTimer=setTimeout(()=>{if(!dragging)target=(target+1)%TOTAL; scheduleNext()}, videoDurationCache[item.src])
   }else{
     const v=document.createElement('video')
     v.src=item.src
     v.onloadedmetadata=()=>{
       videoDurationCache[item.src]=(v.duration||3)*1000
       scheduleNext()
     }
   }
 }else{
   autoTimer=setTimeout(()=>{if(!dragging)target=(target+1)%TOTAL; scheduleNext()},1800)
 }
}
scheduleNext()

let lastX=0,velocity=0
carousel.addEventListener('pointerdown',e=>{
 dragging=true
 lastX=e.clientX
 velocity=0
 carousel.setPointerCapture(e.pointerId)
})

window.addEventListener('pointermove',e=>{
 if(!dragging) return
 const dx=e.clientX-lastX
 const smoothDx = dx * 0.6
 velocity = smoothDx
 target -= smoothDx * 0.006
 lastX=e.clientX
 target=Math.max(0,Math.min(TOTAL-1,target))
})

window.addEventListener('pointerup',e=>{
 if(!dragging) return
 dragging=false
 try{carousel.releasePointerCapture(e.pointerId)}catch{}
 target -= Math.max(Math.min(velocity,10),-10)*0.015
 target=Math.max(0,Math.min(TOTAL-1,target))
 scheduleNext()
})

const audio=document.getElementById('bgAudio')
const btn=document.getElementById('audioBtn')
window.addEventListener('click',()=>audio.play().catch(()=>{}),{once:true})
btn.onclick=()=>{audio.paused?audio.play():audio.pause()}

console.assert(data.length===89)
</script>

</body>
</html>
