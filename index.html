<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice of Pearl</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;overflow:hidden}

body::before{content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%);
animation:bgMove 25s linear infinite}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-5%,5%)}100%{transform:translate(0,0)}}

.logoWrap{position:fixed;top:4px;left:50%;transform:translateX(-50%);z-index:5;text-align:center}
.logo{width:min(49vw,294px)}
.tagline{margin-top:0;font-size:12px;opacity:.7}

.audioBtn{position:fixed;top:12px;right:16px;z-index:10;cursor:pointer;font-size:18px;opacity:.8}

.stage{height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px;position:relative;z-index:2}

.carousel{position:relative;width:100%;height:min(70vh,420px);overflow:hidden;touch-action:none}

.card{position:absolute;left:50%;top:50%;width:clamp(180px,70vw,252px);aspect-ratio:252/370;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.25);background:#000;transform:translate(-50%,-50%);transition:transform .5s cubic-bezier(.22,.61,.36,1),opacity .4s}
.card img,.card video{width:100%;height:100%;object-fit:cover;pointer-events:none}

.center{transform:translate(-50%,-50%) scale(1) rotateY(0deg);z-index:3;opacity:1}
.left{transform:translate(calc(-50% - 90px),-50%) scale(.9) rotateY(12deg);z-index:2;opacity:.7}
.right{transform:translate(calc(-50% + 90px),-50%) scale(.9) rotateY(-12deg);z-index:2;opacity:.7}
.hiddenL{transform:translate(calc(-50% - 260px),-50%) scale(.8);opacity:0}
.hiddenR{transform:translate(calc(-50% + 260px),-50%) scale(.8);opacity:0}

.hint{position:absolute;bottom:40px;font-size:14px;opacity:.6}
</style>
</head>
<body>

<div class="logoWrap">
<img src="logo.png" class="logo">
<div class="tagline">Celebrating 100 weeks</div>
</div>

<div class="audioBtn" id="audioBtn">🔊</div>
<audio id="bgAudio" src="audio.mp3" loop></audio>

<div class="stage">
<div class="carousel" id="carousel"></div>
<div class="hint">← Swipe →</div>
</div>

<script>
const TOTAL=89 // 0–88

// correct slide mapping
const data = Array.from({length:TOTAL},(_,i)=>{
 if(i===20) return {type:'video',src:'slide20.mp4'}
 if(i===35) return {type:'video',src:'cancerday.mp4'}
 if(i===84) return {type:'video',src:'video86.mp4'}
 if(i===88) return {type:'video',src:'FDCI.mp4'}
 if(i<=87) return {type:'image',src:`images/slide${i}.webp`}
 return null
})

const carousel=document.getElementById('carousel')
let index=0
let target=0
let last=-1
let dragging=false

function createCard(item){
 const el=document.createElement('div')
 el.className='card'

 if(item.type==='video'){
  const v=document.createElement('video')
  v.src=item.src
  v.muted=true
  v.loop=true
  v.autoplay=true
  v.playsInline=true
  v.preload='auto'
  v.onloadeddata=()=>v.play().catch(()=>{})
  el.appendChild(v)
 }else{
  const img=document.createElement('img')
  img.src=item.src
  el.appendChild(img)
 }
 return el
}

function render(){
 const current=Math.round(index)
 if(current===last) return
 last=current

 carousel.innerHTML=''

 for(let i=current-2;i<=current+2;i++){
  if(!data[i]) continue
  const card=createCard(data[i])

  if(i===current) card.classList.add('center')
  else if(i===current-1) card.classList.add('left')
  else if(i===current+1) card.classList.add('right')
  else if(i<current) card.classList.add('hiddenL')
  else card.classList.add('hiddenR')

  carousel.appendChild(card)
 }
}

function animate(){
 index += (target-index)*0.08 // smoother easing
 render()
 requestAnimationFrame(animate)
}
animate()

// autoplay faster
setInterval(()=>{
 if(dragging) return
 target=(target+1)%TOTAL
},1800)

// touch drag improved
let startX=0
carousel.addEventListener('touchstart',e=>{
 dragging=true
 startX=e.touches[0].clientX
})

carousel.addEventListener('touchmove',e=>{
 if(!dragging) return
 e.preventDefault()
 const dx=e.touches[0].clientX-startX
 target -= dx*0.008
 startX=e.touches[0].clientX
 target=Math.max(0,Math.min(TOTAL-1,target))
},{passive:false})

carousel.addEventListener('touchend',()=>dragging=false)

// audio autoplay (with fallback for browser restriction)
const audio=document.getElementById('bgAudio')
const btn=document.getElementById('audioBtn')

function playAudio(){
 audio.play().catch(()=>{})
}

window.addEventListener('load',playAudio)

document.addEventListener('click',playAudio,{once:true})

btn.onclick=()=>{
 if(audio.paused){audio.play();btn.innerText='🔊'}
 else{audio.pause();btn.innerText='🔇'}
}

// tests
console.assert(data.length===89,'Total slides incorrect')
console.assert(data[20].type==='video','Slide 20 should be video')
console.assert(data[88].type==='video','Slide 88 should be video')
</script>

</body>
</html>
